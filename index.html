<!doctype html>
<html lang="en">
  <head>

    <title>Task 11 | Nikusha Jgarkava</title>
    <link rel="stylesheet" href="src/style.css" />

  <body>

          >
        </div>
        <div class="buttons">
          <button><</button>
          <button>></button>
        </div>

          <span class="location">📍Berlin, Germany</span>
        </div>
        <div class="city">
          <img src="src/img/london.jpg" alt="london" class="image" />

          <span class="location">📍London, United Kingdom</span>
        </div>
        <div class="city">
          <img src="src/img/venice.jpg" alt="venice" class="image" />

      </div>
